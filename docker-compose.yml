services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace:cached
      - codex-home:/home/node/.codex
      - node-cache:/home/node/.npm
      - pip-cache:/home/node/.cache/pip
      - uv-cache:/home/node/.cache/uv
    working_dir: /workspace
    command: sleep infinity
    environment:
      - PYTHONUNBUFFERED=1
      - CODEX_HOME=/home/node/.codex
    ports:
      - "127.0.0.1:5173:5173"
      - "127.0.0.1:8000:8000"
    security_opt:
    - seccomp=unconfined
    - apparmor=unconfined
    cap_add:
      - SYS_ADMIN

volumes:
  codex-home:
  node-cache:
  pip-cache:
  uv-cache: